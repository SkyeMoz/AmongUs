<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Skeld Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:Inter,sans-serif;background:#000;color:#fff;overflow-x:hidden}

canvas{position:fixed;inset:0;z-index:-1}

#loading{
position:fixed;inset:0;background:#000;
display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:999}

.loader{width:40px;height:40px;border:3px solid #25EDC6;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

.hero{min-height:100vh;display:flex;justify-content:center;padding:20px}
.wrapper{width:100%;max-width:850px}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:16px;
padding:20px;
margin-bottom:18px;
opacity:0;
transform:translateY(20px);
animation:fade .6s ease forwards
}
@keyframes fade{to{opacity:1;transform:translateY(0)}}

h1{font-size:30px;margin-bottom:10px}
h2{font-size:22px;margin-bottom:10px}

.desc{opacity:.8;font-size:14px;line-height:1.5}

button{
border:none;
cursor:pointer;
font-weight:600;
transition:.2s
}
button:hover{transform:scale(1.05)}

.play{background:#25EDC6;color:#000;padding:10px 14px;border-radius:10px}
.more{background:transparent;border:1px solid #25EDC6;color:#25EDC6;padding:10px 14px;border-radius:10px}

.profile{
display:flex;justify-content:center;margin:10px 0
}
.profile img{
width:110px;height:110px;border-radius:50%;
border:3px solid #25EDC6
}

/* MORE */
#moreBox{
max-height:0;overflow:hidden;
transition:.4s ease;opacity:0
}
#moreBox.open{max-height:200px;opacity:1;margin-top:10px}

/* CREST */
.topbar{
display:flex;justify-content:space-between;align-items:center;margin-bottom:10px
}
.crest{
display:flex;gap:10px;align-items:center;
background:rgba(37,237,198,.1);
padding:8px 12px;border-radius:999px
}
.crest img{width:20px;height:20px}

/* STREAMERS */
.streamer{
display:flex;gap:10px;align-items:center;
background:rgba(255,255,255,.04);
padding:10px;border-radius:12px
}
.streamer img{width:60px;height:60px;border-radius:12px}
.refreshBtn{
width:40px;height:40px;border-radius:50%;
display:grid;place-items:center;
background:rgba(37,237,198,.15);
border:1px solid #25EDC6
}
.spin svg{transform:rotate(360deg);transition:.4s}

/* MODS */
.modRow{
display:flex;justify-content:space-between;align-items:center;
background:rgba(255,255,255,.04);
padding:10px;border-radius:12px;margin-top:10px
}
.modRow img{width:40px;height:40px;border-radius:10px}

/* MODAL */
.modalBg{
position:fixed;inset:0;
background:rgba(0,0,0,.7);
display:none;justify-content:center;align-items:center
}
.modal{
background:#111;
padding:20px;border-radius:14px;
width:90%;max-width:400px
}
.modalBtns{display:flex;justify-content:flex-end;gap:10px;margin-top:15px}
</style>
</head>

<body>

<div id="loading"><div class="loader"></div><p>Loading...</p></div>
<canvas id="bg"></canvas>

<div class="hero">
<div class="wrapper">

<!-- CREST TOP -->
<div class="topbar">
<div>The Skeld Hub</div>
<div class="crest">
<img src="settings/Crest.png">
<span id="crest">0</span> SkeldCrest
</div>
</div>

<!-- CARD 1 -->
<div class="card">
<h1>The Skeld Hub</h1>

<div class="profile">
<img src="settings/SkyeMoz.png">
</div>

<p class="desc">
Community hub for custom Among Us modes and events.
</p>

<button class="play" onclick="toggleMore()">See More</button>

<div id="moreBox">
<p class="desc">
Discord events • Multiplayer lobbies • Game modes • Updates
</p>
</div>
</div>

<!-- STREAMERS -->
<div class="card">
<h2>Streamers</h2>

<div class="streamer" id="streamerBox"></div>

<div style="display:flex;gap:10px;margin-top:10px">
<div class="refreshBtn" onclick="randomStreamer()" id="refresh">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#25EDC6">
<path d="M21 12a9 9 0 1 1-3-6.7"></path>
</svg>
</div>
</div>

</div>

<!-- REDEEM -->
<div class="card">
<h2>Redeem Code</h2>
<input id="code" placeholder="Enter code">
<button class="play" onclick="redeem()">Claim</button>
<p id="msg"></p>
</div>

<!-- MODS -->
<div class="card">
<h2>Lobby Mods</h2>

<div class="modRow">
<img src="settings/File.png">
<div>0 Cooldown</div>
<button class="more" onclick="buy('0 Cooldown',1500)">Buy</button>
</div>

<div class="modRow">
<img src="settings/File.png">
<div>SNS Mode</div>
<button class="more" onclick="buy('SNS Mode',500)">Buy</button>
</div>

</div>

</div>
</div>

<!-- MODAL -->
<div class="modalBg" id="modal">
<div class="modal">
<h3 id="mTitle"></h3>
<p id="mText"></p>
<div class="modalBtns">
<button class="more" onclick="closeM()">Cancel</button>
<button class="play">Buy</button>
</div>
</div>
</div>

<script>

// LOAD
window.onload=()=>{
setTimeout(()=>document.getElementById("loading").style.display="none",1000)
}

// CREST
let crest=0;
setInterval(()=>{
crest++;
document.getElementById("crest").innerText=crest;
},1000)

// MORE
function toggleMore(){
document.getElementById("moreBox").classList.toggle("open")
}

// STREAMERS
const streamers=[
{name:"riskylit_",img:"settings/pinned.png",link:"riskylit_",pin:true},
{name:"blondebiss",img:"settings/1.png"},
{name:"kasvvy",img:"settings/3.png"},
{name:"coletickle23",img:"settings/4.png"},
{name:"yaslynbillz",img:"settings/5.png"},
{name:"silversouppeachyp28",img:"settings/6.png"}
]

function randomStreamer(){
const s=streamers[Math.floor(Math.random()*streamers.length)]
document.getElementById("streamerBox").innerHTML=
`<img src="${s.img}"><div>@${s.name}</div>`
}

// REDEEM
const codes={
BBJKL:500,
Risk4Live:1500,
SkyeMozTaxes:60000,
BlondeGirl:420,
SkeldyUs2026:500
}

function redeem(){
let v=document.getElementById("code").value
if(codes[v]){
crest+=codes[v]
document.getElementById("msg").innerText="Claimed!"
}else{
document.getElementById("msg").innerText="Invalid code"
}
}

// MODAL
function buy(name,price){
document.getElementById("modal").style.display="flex"
document.getElementById("mTitle").innerText=name
document.getElementById("mText").innerText=`Buy ${name} for ${price} Crest?`
}
function closeM(){
document.getElementById("modal").style.display="none"
}

// PARTICLES
const c=document.getElementById("bg"),x=c.getContext("2d")
c.width=innerWidth;c.height=innerHeight

let p=[]
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:2})
}

function a(){
x.clearRect(0,0,c.width,c.height)
x.fillStyle="white"
p.forEach(i=>{
x.beginPath()
x.arc(i.x,i.y,i.r,0,Math.PI*2)
x.fill()
})
requestAnimationFrame(a)
}
a()

</script>

</body>
</html>
