<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skeld Community</title>

  <!-- Modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- particle background -->
  <canvas id="particles"></canvas>

  <div class="container">

    <h1>🚀 Skeld Community</h1>
    <p class="subtitle">A modern crew hub inspired by space chaos</p>

    <div class="card">
      <h2>Control Panel</h2>

      <div class="buttons">
        <button onclick="alert('Discord coming soon')">💬 Discord</button>
        <button onclick="alert('Instagram link')">📸 Instagram</button>
        <button onclick="alert('TikTok link')">🎥 TikTok</button>
        <button onclick="alert('Test button works')">🧪 Test Button</button>
      </div>
    </div>

    <div class="card">
      <h2>Quick Actions</h2>

      <div class="buttons">
        <button onclick="alert('Join Lobby System')">🎮 Join Lobby</button>
        <button onclick="alert('Members list soon')">👥 Members</button>
        <button onclick="alert('Announcements soon')">📡 Updates</button>
      </div>
    </div>

    <footer>
      Made for Skeld Community • Among Us Inspired Space UI
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
