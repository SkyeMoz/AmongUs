<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Skeld Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:Inter,sans-serif;background:black;color:white;overflow-x:hidden;}
canvas{position:fixed;inset:0;z-index:-1;}

#loading{
  position:fixed;inset:0;background:black;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:999;
}
.loader{
  width:40px;height:40px;
  border:3px solid #25EDC6;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}
@keyframes spin{100%{transform:rotate(360deg);}}

.hero{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.wrapper{width:100%;max-width:800px;}

.card{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(10px);
  margin-bottom:20px;
  opacity:0;
  transform:translateY(24px) scale(0.98);
}

body.loaded .card{animation:cardIn .7s ease forwards;}
body.loaded .card:nth-child(1){animation-delay:.05s;}
body.loaded .card:nth-child(2){animation-delay:.18s;}
body.loaded .card:nth-child(3){animation-delay:.31s;}
body.loaded .card:nth-child(4){animation-delay:.44s;}
body.loaded .card:nth-child(5){animation-delay:.57s;}

@keyframes cardIn{
  from{opacity:0;transform:translateY(24px) scale(0.98);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

h1{font-size:32px;margin-bottom:10px;}
h2{font-size:24px;margin-bottom:8px;}

.desc{font-size:14px;opacity:.85;line-height:1.6;}

.buttons{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}

button{
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}
button:hover{transform:translateY(-1px) scale(1.03);}

.play{background:#25EDC6;color:black;padding:10px 16px;border-radius:12px;}
.more{background:transparent;border:1px solid #25EDC6;color:#25EDC6;padding:10px 16px;border-radius:12px;}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-top:10px;
  background:rgba(255,255,255,.08);
  color:white;
}

/* crest bar */
#crestBar{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  border:1px solid rgba(37,237,198,.6);
  padding:8px 16px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  z-index:50;
}

/* modal */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:100;
}
.modalBox{
  background:#111;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:320px;
}

/* messages */
#msg{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#25EDC6;
  color:black;
  padding:10px 16px;
  border-radius:12px;
  opacity:0;
  transition:.4s;
  z-index:200;
}
</style>
</head>

<body>

<div id="crestBar">Crest: <span id="crestCount">0</span></div>
<div id="msg"></div>

<div id="modal">
  <div class="modalBox">
    <h3 id="modalName"></h3>
    <p id="modalPrice"></p>
    <div class="buttons">
      <button class="more" onclick="closeModal()">Cancel</button>
      <button class="play" onclick="confirmPurchase()">Confirm</button>
    </div>
  </div>
</div>

<div id="loading">
  <div class="loader"></div>
  <p>Launching The Skeld Hub...</p>
</div>

<canvas id="bg"></canvas>

<div class="hero">
<div class="wrapper">

<div class="card">
  <h1>The Skeld Hub</h1>
  <p class="desc">Community platform for Among Us style gameplay.</p>
</div>

<div class="card">
  <h2>Redeem Code</h2>
  <input id="redeemInput" placeholder="Enter code...">
  <div class="buttons">
    <button class="play" onclick="redeem()">Redeem</button>
  </div>
</div>

<div class="card">
  <h2>Lobby Mods</h2>
  <div class="buttons">
    <button class="more" onclick="openModal('0 Cooldown',1500)">0 Cooldown</button>
    <button class="more" onclick="openModal('SNS Mode',500)">SNS Mode</button>
  </div>
</div>

</div></div>

<script>
// ⚡ FAST LOADING FIX
document.addEventListener('DOMContentLoaded',()=>{
  const loader=document.getElementById('loading');
  document.body.classList.add('loaded');
  loader.style.transition='opacity .35s ease';
  loader.style.opacity='0';
  setTimeout(()=>loader.style.display='none',350);
});

// CREST SYSTEM
let crest=Number(localStorage.getItem("crest"))||0;
const crestEl=document.getElementById("crestCount");

function updateCrest(){
  crestEl.textContent=crest;
  localStorage.setItem("crest",crest);
}

setInterval(()=>{
  crest++;
  updateCrest();
},1000);

updateCrest();

// MESSAGE SYSTEM
function showMsg(t){
  const m=document.getElementById('msg');
  m.textContent=t;
  m.style.opacity=1;
  setTimeout(()=>m.style.opacity=0,2000);
}

// REDEEM
const codes={
  BBJKL:500,
  Risk4Live:1500,
  SkyeMozTaxes:60000,
  BlondeGirl:420,
  SkeldyUs2026:500,
  AmongUs:230
};

function redeem(){
  const v=document.getElementById('redeemInput').value.trim();
  if(codes[v]){
    crest+=codes[v];
    updateCrest();
    showMsg("Redeemed!");
  }else showMsg("Invalid code");
}

// SHOP
let currentItem=null;

function openModal(name,price){
  currentItem={name,price};
  modalName.textContent=name;
  modalPrice.textContent=price+" Crest";
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

function confirmPurchase(){
  if(crest<currentItem.price){
    showMsg("Not enough crest");
    return;
  }
  crest-=currentItem.price;
  updateCrest();
  closeModal();
  showMsg("Purchased!");
}

// PARTICLES
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();

let p=Array.from({length:80},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  dx:(Math.random()-0.5)*0.7,
  dy:(Math.random()-0.5)*0.7,
  r:Math.random()*2
}));

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  p.forEach(o=>{
    o.x+=o.dx;
    o.y+=o.dy;
    if(o.x<0||o.x>canvas.width)o.dx*=-1;
    if(o.y<0||o.y>canvas.height)o.dy*=-1;
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.r,0,6.28);
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();

window.addEventListener('resize',resize);
</script>

</body>
</html>
