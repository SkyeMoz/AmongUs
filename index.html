<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Skeld Hub</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:Inter,sans-serif;background:#000;color:#fff;overflow-x:hidden}
canvas{position:fixed;inset:0;z-index:-1}

#loading{
position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999
}
.loader{width:42px;height:42px;border:3px solid #25EDC6;border-top:3px solid transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

.hero{min-height:100vh;display:flex;justify-content:center;padding:20px}
.wrapper{width:100%;max-width:900px}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:16px;
padding:20px;
margin-bottom:16px;
opacity:0;
transform:translateY(20px);
animation:fade .6s ease forwards
}
@keyframes fade{to{opacity:1;transform:translateY(0)}}

h1{font-size:30px}
h2{font-size:22px;margin-bottom:10px}
.desc{opacity:.85;font-size:14px;line-height:1.5}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.crest{display:flex;align-items:center;gap:10px;background:rgba(37,237,198,.12);padding:8px 12px;border-radius:999px}
.crest img{width:22px;height:22px}

.profileTop{display:flex;justify-content:center;margin:10px 0}
.profileTop img{width:110px;height:110px;border-radius:50%;border:3px solid #25EDC6}

button{border:none;cursor:pointer;font-weight:600;transition:.2s}
button:hover{transform:scale(1.04)}
.play{background:#25EDC6;color:#000;padding:10px 14px;border-radius:10px}
.more{background:transparent;border:1px solid #25EDC6;color:#25EDC6;padding:10px 14px;border-radius:10px}

#moreBox{max-height:0;overflow:hidden;opacity:0;transition:.4s ease}
#moreBox.open{max-height:200px;opacity:1;margin-top:10px}

.streamerBox{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.04);padding:10px;border-radius:12px}
.streamerBox img{width:60px;height:60px;border-radius:12px}

.refresh{
width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
border:1px solid #25EDC6;background:rgba(37,237,198,.12)
}

.modRow{display:flex;justify-content:space-between;align-items:center;
padding:10px;background:rgba(255,255,255,.04);border-radius:12px;margin-top:10px}
.modRow img{width:40px;height:40px;border-radius:10px}

.modalBg{
position:fixed;inset:0;background:rgba(0,0,0,.7);
display:none;align-items:center;justify-content:center
}
.modal{background:#111;padding:20px;border-radius:14px;width:90%;max-width:420px}
.modalBtns{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}

input{width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#000;color:#fff;margin-top:10px}

</style></head><body><div id="loading"><div class="loader"></div><p>Loading Skeld Hub...</p></div>
<canvas id="bg"></canvas><div class="hero">
<div class="wrapper"><!-- CREST --><div class="topbar">
<div>The Skeld Hub</div>
<div class="crest">
<img src="settings/Crest.png">
<span id="crest">0</span> SkeldCrest
</div>
</div><!-- MAIN CARD --><div class="card">
<h1>The Skeld Hub</h1><div class="profileTop">
<img src="settings/SkyeMoz.png">
</div><p class="desc">Community hub for Among Us style events, modes, and multiplayer fun.</p><button class="play" onclick="toggleMore()">See More</button>

<div id="moreBox">
<p class="desc">Discord events • Game modes • Updates • Lobby systems</p>
</div>
</div><!-- STREAMERS --><div class="card">
<h2>Streamers</h2>
<div class="streamerBox" id="streamer"></div>
<div class="refresh" onclick="randomStreamer()">🔀</div>
</div><!-- REDEEM --><div class="card">
<h2>Redeem Code</h2>
<input id="code" placeholder="Enter code">
<button class="play" onclick="redeem()">Claim</button>
<p id="msg"></p>
</div><!-- MODS --><div class="card">
<h2>Lobby Mods</h2><div class="modRow">
<img src="settings/File.png">
<div>0 Cooldown</div>
<button class="more" onclick="buy('0 Cooldown',1500)">Buy</button>
</div><div class="modRow">
<img src="settings/File.png">
<div>SNS Mode</div>
<button class="more" onclick="buy('SNS Mode',500)">Buy</button>
</div></div></div>
</div><!-- MODAL --><div class="modalBg" id="modal">
<div class="modal">
<h3 id="t"></h3>
<p id="d"></p>
<div class="modalBtns">
<button class="more" onclick="closeM()">Cancel</button>
<button class="play">Buy</button>
</div>
</div>
</div><script>

window.onload=()=>setTimeout(()=>document.getElementById('loading').style.display='none',1000)

let crest=0
setInterval(()=>{
crest+=1
document.getElementById('crest').innerText=crest
},1000)

function toggleMore(){
document.getElementById('moreBox').classList.toggle('open')
}

const streamers=[
{name:"riskylit_",img:"settings/pinned.png"},
{name:"blondebiss",img:"settings/1.png"},
{name:"kasvvy",img:"settings/3.png"},
{name:"coletickle23",img:"settings/4.png"}
]

function randomStreamer(){
const s=streamers[Math.floor(Math.random()*streamers.length)]
document.getElementById('streamer').innerHTML=`<img src='${s.img}'><div>@${s.name}</div>`
}
randomStreamer()

const codes={BBJKL:500,Risk4Live:1500,SkyeMozTaxes:60000,BlondeGirl:420}

function redeem(){
let v=document.getElementById('code').value
if(codes[v]){crest+=codes[v];document.getElementById('msg').innerText="Claimed!"}
else document.getElementById('msg').innerText="Invalid code"
}

function buy(n,p){
document.getElementById('modal').style.display='flex'
document.getElementById('t').innerText=n
document.getElementById('d').innerText=`Buy ${n} for ${p} Crest?`
}
function closeM(){document.getElementById('modal').style.display='none'}

</script></body>
</html>
